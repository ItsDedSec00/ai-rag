<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG-Chat</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" id="hljs-theme">
</head>
<body>
    <div id="app">
        <!-- Sidebar -->
        <aside id="sidebar">
            <div class="sidebar-header">
                <h2>RAG-Chat</h2>
                <button id="new-chat-btn" title="Neuer Chat">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Neuer Chat
                </button>
            </div>
            <div id="chat-list"></div>
        </aside>
        <div id="sidebar-backdrop"></div>

        <!-- Main chat area -->
        <main id="chat-area">
            <header id="chat-header">
                <button id="sidebar-toggle" title="Seitenleiste">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
                <h1>RAG-Chat</h1>
                <button id="theme-toggle" title="Design wechseln">
                    <svg id="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                    <svg id="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="hidden"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                </button>
            </header>

            <!-- Messages -->
            <div id="messages">
                <div id="welcome" class="welcome-msg">
                    <h2>Willkommen bei RAG-Chat</h2>
                    <p>Stelle eine Frage zu deinen Dokumenten oder lade eine Datei hoch.</p>
                </div>
            </div>

            <!-- Thinking indicator (Claude-style) -->
            <div id="thinking-indicator" class="hidden">
                <div class="thinking-bubble">
                    <div class="thinking-spinner"></div>
                    <div class="thinking-text">
                        <span class="thinking-word">Nachdenken…</span>
                    </div>
                </div>
            </div>

            <!-- Upload info bar -->
            <div id="upload-bar" class="hidden">
                <div style="display:flex;align-items:center;gap:8px;width:100%">
                    <span id="upload-bar-info" style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">📎 Datei</span>
                    <button id="upload-bar-remove" title="Entfernen">✕</button>
                </div>
                <div id="upload-progress" class="upload-progress hidden">
                    <div id="upload-progress-fill" class="upload-progress-fill"></div>
                </div>
            </div>

            <!-- Input form -->
            <form id="chat-form">
                <div class="input-row">
                    <label id="upload-btn" for="file-input" title="Datei hochladen (PDF, DOCX, TXT, MD, CSV)">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
                    </label>
                    <input type="file" id="file-input" hidden accept=".pdf,.docx,.txt,.md,.csv">
                    <textarea id="message-input" placeholder="Nachricht eingeben… (Shift+Enter für Zeilenumbruch)" rows="1"></textarea>
                    <button type="submit" id="send-btn" title="Senden">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                    </button>
                    <button type="button" id="stop-btn" class="hidden" title="Abbrechen">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
                    </button>
                </div>
            </form>

            <footer>
                &copy; 2026 <a href="https://duelle.org" target="_blank" rel="noopener">David Dülle</a>
            </footer>
        </main>
    </div>

    <!-- Drop overlay -->
    <div id="drop-overlay" class="hidden">
        <div class="drop-content">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            <p>Datei hier ablegen</p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="/js/ui.js"></script>
    <script src="/js/upload.js"></script>
    <script src="/js/chat.js"></script>
</body>
</html>
