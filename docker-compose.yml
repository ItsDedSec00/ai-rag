services:
  ollama:
    image: ollama/ollama
    container_name: rag-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    # GPU passthrough via docker-compose.gpu.yml (automatisch erkannt)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - rag-network

  chromadb:
    image: chromadb/chroma:latest
    container_name: rag-chromadb
    restart: unless-stopped
    volumes:
      - chromadb_data:/chroma/chroma
    environment:
      - CHROMA_SERVER_AUTH_CREDENTIALS_PROVIDER=chromadb.auth.token.TokenConfigServerAuthCredentialsProvider
      - ANONYMIZED_TELEMETRY=false
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -sf http://localhost:8000/api/v2/heartbeat || curl -sf http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - rag-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag-backend
    restart: unless-stopped
    environment:
      - OLLAMA_HOST=${OLLAMA_HOST:-ollama}
      - OLLAMA_PORT=${OLLAMA_PORT:-11434}
      - CHROMA_HOST=${CHROMA_HOST:-chromadb}
      - CHROMA_PORT=${CHROMA_PORT:-8000}
      - KNOWLEDGE_PATH=${KNOWLEDGE_PATH:-/data/knowledge}
      - CONFIG_PATH=${CONFIG_PATH:-/data/config}
      - CHAT_MODEL=${CHAT_MODEL:-llama3.2:1b}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-nomic-embed-text}
      - RAG_TOP_K=${RAG_TOP_K:-5}
      - CONTEXT_WINDOW=${CONTEXT_WINDOW:-4096}
      - TEMPERATURE=${TEMPERATURE:-0.7}
      - APP_VERSION=${APP_VERSION:-dev}
      - GITHUB_REPO=${GITHUB_REPO:-}
    volumes:
      - knowledge_data:/data/knowledge
      - config_data:/data/config
      - logs_data:/data/logs
      - ./.gpu-mode:/data/.gpu-mode:ro
      - ./.update-flag:/data/.update-flag
    depends_on:
      ollama:
        condition: service_started
      chromadb:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - rag-network

  nginx:
    image: nginx:alpine
    container_name: rag-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/htpasswd:/etc/nginx/htpasswd:ro
      - ./frontend:/usr/share/nginx/html/frontend:ro
      - ./admin:/usr/share/nginx/html/admin:ro
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - rag-network

volumes:
  ollama_data:
    name: rag-ollama-data
  chromadb_data:
    name: rag-chromadb-data
  knowledge_data:
    name: rag-knowledge-data
  config_data:
    name: rag-config-data
  logs_data:
    name: rag-logs-data

networks:
  rag-network:
    name: rag-network
    driver: bridge
