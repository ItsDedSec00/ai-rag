# GPU-Override: Wird automatisch eingebunden wenn eine NVIDIA GPU erkannt wird.
# Nicht manuell editieren — wird von start.sh verwaltet.

services:
  ollama:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
